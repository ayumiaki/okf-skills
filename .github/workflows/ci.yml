name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Validate plugin & marketplace manifests (legacy)
        run: jq empty .claude-plugin/plugin.json .claude-plugin/marketplace.json

      - name: Validate example bundle (strict)
        run: uv run skills/validate/scripts/okf_validate.py examples/sample-bundle --strict

      - name: Validate this repo's own .okf bundle (strict, dogfooding)
        run: uv run skills/validate/scripts/okf_validate.py .okf --strict

      - name: Bootstrap smoke-test — okf_forge.py must scaffold a valid bundle
        run: |
          tmp="$(mktemp -d)"
          uv run scripts/okf_forge.py "$tmp/.okf" --title "Agent-Forge"
          uv run skills/validate/scripts/okf_validate.py "$tmp/.okf" --strict

      - name: Self-test — a non-conformant bundle must fail
        run: |
          tmp="$(mktemp -d)"
          printf 'no frontmatter\n' > "$tmp/bad.md"
          if uv run skills/validate/scripts/okf_validate.py "$tmp"; then
            echo "validator failed to reject a non-conformant bundle" >&2
            exit 1
          fi
          echo "ok: non-conformant bundle correctly rejected"

      - name: Self-test — script-breaking sequences in concept bodies are neutralized
        run: |
          # A concept body may legitimately contain </script> (ends the inline
          # data script early), <!--<script (arms the script-data double-escaped
          # state, where even the template's real closing tag stops working), or
          # the literal string __EDGES__ (a naive template substitution would
          # splice the edges JSON into the middle of a node body). None of these
          # may corrupt the generated page. Assertions are on outcomes, not on a
          # specific escaping strategy.
          tmp="$(mktemp -d)"
          cat > "$tmp/snippet.md" <<'MD'
          ---
          type: Reference
          title: Snippet with hostile-looking but benign content
          ---
          Example markup a doc might contain:

          ```html
          <script src="app.js"></script>REPRO_MARKER
          <!--<script>DOUBLE_ESCAPE_MARKER
          ```

          The template placeholder __EDGES__ SPLICE_MARKER must survive verbatim.
          MD
          uv run skills/visualize/scripts/okf_visualize.py "$tmp" -o "$tmp/viz.html"
          grep -qF 'REPRO_MARKER' "$tmp/viz.html" || {
            echo "concept body went missing from the output entirely" >&2
            exit 1
          }
          if grep -qF '</script>REPRO_MARKER' "$tmp/viz.html"; then
            echo "raw </script> from a concept body leaked into the inline data script" >&2
            exit 1
          fi
          if grep -qF '<!--<script>DOUBLE_ESCAPE_MARKER' "$tmp/viz.html"; then
            echo "raw <!--<script leaked (script-data double-escaped state hazard)" >&2
            exit 1
          fi
          grep -qF '__EDGES__ SPLICE_MARKER' "$tmp/viz.html" || {
            echo "literal __EDGES__ in a concept body was clobbered by template substitution" >&2
            exit 1
          }
          echo "ok: script-breaking sequences in concept bodies are neutralized"
